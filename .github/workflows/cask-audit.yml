name: Cask Audit

on:
  pull_request:
    paths:
      - 'Casks/**'
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/brianmacy/homebrew-senzingsdk-runtime-unofficial"
          ln -sf "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/brianmacy/homebrew-senzingsdk-runtime-unofficial"

      - name: Audit Casks
        run: brew audit --cask senzingsdk-runtime-unofficial
